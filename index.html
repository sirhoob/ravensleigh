<!DOCTYPE html>
<html>
<head>
    <title>Ravensleigh | Base</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        nav { padding: 20px; border-bottom: 1px solid #00f2ff; display: flex; justify-content: center; gap: 20px; }
        a { color: #00f2ff; text-decoration: none; border: 1px solid #00f2ff; padding: 5px 15px; }
        .hero { padding: 50px; }
        #clearance-display { color: #fff; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">BASE</a>
        <a href="/communications/">COMMS</a>
        <a href="/documents/">ARCHIVES</a>
        <span id="admin-link"></span>
        <button id="out" style="background:none; border:1px solid red; color:red; cursor:pointer;">DISCONNECT</button>
    </nav>
    <div class="hero">
        <h1>RAVENSLEIGH SECTOR</h1>
        <div id="user-info">Scanning Identity...</div>
        <div id="clearance-display"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { /* Your Config Here */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const labels = ["None", "Low Clearance", "Low Clearance", "Medium Clearance", "High Clearance", "Commander Clearance"];

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "/login/"; return; }
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists() && snap.data().approved) {
                const data = snap.data();
                document.getElementById('user-info').innerText = `Welcome, ${data.name} [${data.role}]`;
                document.getElementById('clearance-display').innerText = `STATUS: ${labels[data.permLevel]}`;
                if(data.permLevel === 5) {
                    document.getElementById('admin-link').innerHTML = '<a href="/control-panel/" style="border-color:yellow; color:yellow;">CONTROL PANEL</a>';
                }
            } else { window.location.href = "/login/"; }
        });

        document.getElementById('out').onclick = () => signOut(auth).then(() => window.location.reload());
    </script>
</body>
</html>Out(auth).then(() => window.location.reload());

</body>
</html>
