<!DOCTYPE html>
<html>
<head>
    <title>Ravensleigh | Base</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        nav { padding: 20px; border-bottom: 1px solid #00f2ff; display: flex; justify-content: center; gap: 20px; }
        a { color: #00f2ff; text-decoration: none; border: 1px solid #00f2ff; padding: 5px 15px; }
        a:hover { background: #00f2ff; color: #000; }
        .hero { padding: 50px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">HOME</a>
        <a href="/communications/">COMMS</a>
        <a href="/documents/">ARCHIVES</a>
        <button id="out" style="background:none; border:1px solid red; color:red; cursor:pointer;">DISCONNECT</button>
    </nav>
    <div class="hero">
        <h1>RAVENSLEIGH SECTOR: HOME</h1>
        <p>Welcome, verified lifeform. The hub is fully operational.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnwjt-RorMnufPR9He4-6alU7G_ox04lU",
            authDomain: "ravensleigh-website.firebaseapp.com",
            projectId: "ravensleigh-website",
            storageBucket: "ravensleigh-website.firebasestorage.app",
            messagingSenderId: "892085441390",
            appId: "1:892085441390:web:619f81061a22cca61ca77f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "/login/";
            } else {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (!snap.exists() || !snap.data().approved) {
                    window.location.href = "/login/";
                }
            }
        });

        document.getElementById('out').onclick = () => signOut(auth).then(() => window.location.reload());
    </script>
</body>
</html>
