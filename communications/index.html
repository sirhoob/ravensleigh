<!DOCTYPE html>
<html>
<head>
    <title>Ravensleigh | Comms</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        nav { padding: 20px; border-bottom: 1px solid #00f2ff; text-align: center; }
        #chat-box { flex-grow: 1; border: 1px solid #00f2ff; margin: 20px; padding: 15px; overflow-y: auto; background: rgba(0,242,255,0.02); }
        .message { margin-bottom: 12px; border-bottom: 1px solid #111; padding-bottom: 5px; position: relative; }
        .role-tag { font-size: 0.7em; color: #aaa; text-transform: uppercase; margin-right: 5px; border: 1px solid #444; padding: 2px 4px; }
        .user-name { font-weight: bold; color: #fff; }
        .del-btn { background: none; border: 1px solid red; color: red; font-size: 0.6em; cursor: pointer; float: right; padding: 2px 5px; }
        .input-area { padding: 20px; display: flex; gap: 10px; }
        input { background: #111; border: 1px solid #00f2ff; color: #00f2ff; padding: 10px; flex-grow: 1; }
        button#send { background: #00f2ff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="/" style="color:#00f2ff; text-decoration:none; margin: 0 15px;">HOME</a>
        <a href="/documents/" style="color:#00f2ff; text-decoration:none; margin: 0 15px;">ARCHIVES</a>
    </nav>

    <div id="chat-box">Establishing connection...</div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Enter signal...">
        <button id="send">SEND</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnwjt-RorMnufPR9He4-6alU7G_ox04lU",
            authDomain: "ravensleigh-website.firebaseapp.com",
            projectId: "ravensleigh-website",
            storageBucket: "ravensleigh-website.firebasestorage.app",
            messagingSenderId: "892085441390",
            appId: "1:892085441390:web:619f81061a22cca61ca77f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myData = { name: "Unknown", role: "Visitor", permLevel: 1 };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "/login/"; }
            else {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists() && snap.data().approved) {
                    myData = snap.data();
                    startChat();
                } else { window.location.href = "/login/"; }
            }
        });

        async function sendSignal() {
            const text = document.getElementById('msg').value;
            if (text.trim() === "") return;
            await addDoc(collection(db, "messages"), {
                text: text,
                name: myData.name,
                role: myData.role,
                time: serverTimestamp()
            });
            document.getElementById('msg').value = "";
        }

        function startChat() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach((d) => {
                    const m = d.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = "message";
                    
                    // Add delete button ONLY if I am Level 2
                    let delHtml = (myData.permLevel >= 2) ? `<button class="del-btn" onclick="erase('${d.id}')">ERASE</button>` : "";
                    
                    msgDiv.innerHTML = `${delHtml}<span class="role-tag">${m.role}</span><span class="user-name">${m.name}</span>: ${m.text}`;
                    box.appendChild(msgDiv);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.erase = async (id) => {
            if (confirm("Permanently erase this signal from the archives?")) {
                await deleteDoc(doc(db, "messages", id));
            }
        };

        document.getElementById('send').onclick = sendSignal;
        document.getElementById('msg').addEventListener("keypress", (e) => { if (e.key === "Enter") sendSignal(); });
    </script>
</body>
</html>
