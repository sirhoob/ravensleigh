<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ravensleigh | Comms</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        nav { padding: 15px; border-bottom: 1px solid #00f2ff; text-align: center; }
        nav a { color: #00f2ff; text-decoration: none; margin: 0 15px; }
        
        #pinned-section { border-left: 4px solid yellow; background: rgba(255, 255, 0, 0.05); display: none; padding: 10px; margin: 10px; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; border: 1px solid #111; margin: 10px; background: rgba(0,242,255,0.01); }
        
        .msg { margin-bottom: 15px; border-bottom: 1px solid #111; padding-bottom: 5px; cursor: pointer; }
        .pin-tag { color: yellow; font-size: 0.7em; margin-right: 10px; }
        .role { font-size: 0.7em; color: #666; text-transform: uppercase; margin-right: 8px; }
        .name { font-weight: bold; color: #fff; }
        
        .input-wrap { padding: 20px; display: flex; gap: 10px; background: #050505; }
        input { background: #000; border: 1px solid #00f2ff; color: #00f2ff; padding: 12px; flex-grow: 1; outline: none; }
        button#send { background: #00f2ff; color: #000; border: none; padding: 0 30px; cursor: pointer; font-weight: bold; }
        .wipe-btn { color: red; font-size: 10px; cursor: pointer; text-align: center; padding-bottom: 10px; text-decoration: underline; }
    </style>
</head>
<body>

    <nav><a href="/">BASE</a> | <a href="/documents/">ARCHIVES</a></nav>

    <div id="pinned-section"></div>
    <div id="chat-box">Establishing link...</div>

    <div class="input-wrap">
        <input type="text" id="m-in" placeholder="Transmit signal..." autocomplete="off">
        <button id="send">SEND</button>
    </div>
    
    <div id="wipe-link" class="wipe-btn" style="display:none;" onclick="wipeAll()">[ DANGER: PURGE ALL CHAT LOGS ]</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, deleteDoc, updateDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnwjt-RorMnufPR9He4-6alU7G_ox04lU",
            authDomain: "ravensleigh-website.firebaseapp.com",
            projectId: "ravensleigh-website",
            storageBucket: "ravensleigh-website.firebasestorage.app",
            messagingSenderId: "892085441390",
            appId: "1:892085441390:web:619f81061a22cca61ca77f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userProfile = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "/login/"; return; }
            const snap = await getDoc(doc(db, "users", user.uid));
            userProfile = snap.data();
            
            if (userProfile.permLevel < 2) {
                alert("Clearance 2 Required."); window.location.href = "/";
            } else {
                if(userProfile.permLevel === 5) document.getElementById('wipe-link').style.display = "block";
                startComms();
            }
        });

        window.msgAction = async (id, isPinned, event) => {
            if (!event.shiftKey || userProfile.permLevel < 4) return;
            const cmd = prompt("COMMANDER OVERRIDE: Type 'ERASE' or 'PIN'").toUpperCase();
            if (cmd === 'ERASE') await deleteDoc(doc(db, "messages", id));
            if (cmd === 'PIN' && userProfile.permLevel === 5) await updateDoc(doc(db, "messages", id), { pinned: !isPinned });
        };

        window.wipeAll = async () => {
            if (confirm("Purge all logs?")) {
                const snap = await getDocs(collection(db, "messages"));
                const batch = writeBatch(db);
                snap.forEach(d => batch.delete(d.ref));
                await batch.commit();
            }
        };

        function startComms() {
            onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
                const box = document.getElementById('chat-box');
                const pBox = document.getElementById('pinned-section');
                box.innerHTML = ""; pBox.innerHTML = "";
                let hasPins = false;

                snap.forEach(d => {
                    const m = d.data();
                    const html = `<div class="msg" onclick="msgAction('${d.id}', ${m.pinned}, event)">
                        ${m.pinned ? '<span class="pin-tag">[PRIORITY]</span>' : ''}
                        <span class="role">${m.role}</span><span class="name">${m.name}</span>: ${m.text}
                    </div>`;
                    
                    if (m.pinned) { hasPins = true; pBox.innerHTML += html; }
                    else { box.innerHTML += html; }
                });
                pBox.style.display = hasPins ? "block" : "none";
                box.scrollTop = box.scrollHeight;
            });
        }

        const sendMsg = async () => {
            const input = document.getElementById('m-in');
            if (input.value.trim()) {
                await addDoc(collection(db, "messages"), {
                    text: input.value, name: userProfile.name, role: userProfile.role,
                    timestamp: serverTimestamp(), pinned: false
                });
                input.value = "";
            }
        };
        document.getElementById('send').onclick = sendMsg;
        document.getElementById('m-in').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
    </script>
</body>
</html>
