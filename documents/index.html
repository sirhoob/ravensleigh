<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ravensleigh | Documents</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; }
        nav { padding: 20px; border-bottom: 1px solid #00f2ff; text-align: center; }
        .container { padding: 40px; max-width: 900px; margin: auto; }
        .doc-card { border: 1px solid #222; padding: 25px; margin-bottom: 20px; background: rgba(0, 242, 255, 0.02); line-height: 1.6; }
        
        #editor-zone { display: none; background: #111; border: 2px solid #00f2ff; padding: 20px; margin-bottom: 30px; }
        .toolbar { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .toolbar button { background: #000; color: #00f2ff; border: 1px solid #00f2ff; cursor: pointer; padding: 5px 10px; font-family: inherit; }
        #edit-area { background: #fff; color: #000; min-height: 250px; padding: 15px; outline: none; margin-bottom: 15px; }
        
        .create-btn { background: #00f2ff; color: #000; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 20px; font-family: inherit; }
    </style>
</head>
<body>

    <nav><a href="/" style="color:#00f2ff; text-decoration:none;">[ BACK TO BASE ]</a></nav>

    <div class="container">
        <h1>SECURE DOCUMENTS</h1>
        
        <button id="new-doc-btn" class="create-btn" style="display:none;">+ INITIALIZE NEW DATA FILE</button>

        <div id="editor-zone">
            <div class="toolbar">
                <button onclick="document.execCommand('bold', false, null)"><b>B</b></button>
                <button onclick="document.execCommand('italic', false, null)"><i>I</i></button>
                <button onclick="document.execCommand('underline', false, null)"><u>U</u></button>
                <button onclick="document.execCommand('formatBlock', false, 'h1')">H1</button>
                <button onclick="document.execCommand('formatBlock', false, 'h2')">H2</button>
                <button onclick="document.execCommand('foreColor', false, '#ff0000')">Red</button>
                <button id="save-btn" style="background:#00f2ff; color:#000; margin-left:auto;">UPLOAD TO CORE</button>
            </div>
            <div id="edit-area" contenteditable="true"></div>
            <div style="font-size: 0.8em;">
                Min Clearance: <input type="number" id="min-lvl" value="1" min="1" max="5" style="width:40px; background:#000; color:#00f2ff; border:1px solid #00f2ff;">
                | <input type="checkbox" id="lvl4-edit"> Allow High Clearance (Lvl 4) to edit
            </div>
        </div>

        <div id="doc-list">Scanning data banks...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnwjt-RorMnufPR9He4-6alU7G_ox04lU",
            authDomain: "ravensleigh-website.firebaseapp.com",
            projectId: "ravensleigh-website",
            storageBucket: "ravensleigh-website.firebasestorage.app",
            messagingSenderId: "892085441390",
            appId: "1:892085441390:web:619f81061a22cca61ca77f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myLvl = 0;
        let editingId = null;

        onAuthStateChanged(auth, async (user) => {
            if(!user) return;
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()){
                myLvl = snap.data().permLevel;
                if(myLvl === 5) document.getElementById('new-doc-btn').style.display = "block";
                loadDocs();
            }
        });

        function loadDocs() {
            onSnapshot(collection(db, "documents"), (snap) => {
                const list = document.getElementById('doc-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    if(myLvl >= (data.minClearance || 1)) {
                        const div = document.createElement('div');
                        div.className = "doc-card";
                        let editBtn = "";
                        if(myLvl === 5 || (myLvl === 4 && data.allowLvl4Edit)) {
                            editBtn = `<button onclick="window.openEdit('${d.id}')" style="float:right; cursor:pointer;">EDIT</button>`;
                        }
                        div.innerHTML = `${editBtn}<div>${data.html}</div>`;
                        list.appendChild(div);
                    }
                });
            });
        }

        window.openEdit = async (id) => {
            const snap = await getDoc(doc(db, "documents", id));
            editingId = id;
            document.getElementById('edit-area').innerHTML = snap.data().html;
            document.getElementById('min-lvl').value = snap.data().minClearance || 1;
            document.getElementById('lvl4-edit').checked = snap.data().allowLvl4Edit || false;
            document.getElementById('editor-zone').style.display = "block";
        };

        document.getElementById('new-doc-btn').onclick = () => { 
            editingId = null; 
            document.getElementById('edit-area').innerHTML = ""; 
            document.getElementById('editor-zone').style.display = "block"; 
        };
        
        document.getElementById('save-btn').onclick = async () => {
            const payload = {
                html: document.getElementById('edit-area').innerHTML,
                minClearance: parseInt(document.getElementById('min-lvl').value),
                allowLvl4Edit: document.getElementById('lvl4-edit').checked
            };
            if(editingId) await updateDoc(doc(db, "documents", editingId), payload);
            else await addDoc(collection(db, "documents"), payload);
            document.getElementById('editor-zone').style.display = "none";
        };
    </script>
</body>
</html>
