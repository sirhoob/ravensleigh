<!DOCTYPE html>
<html>
<head>
    <title>Ravensleigh | Archives</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; }
        nav { padding: 20px; border-bottom: 1px solid #00f2ff; text-align: center; }
        .container { padding: 40px; max-width: 900px; margin: auto; }
        .doc-card { border: 1px solid #222; padding: 20px; margin-bottom: 20px; background: rgba(255,255,255,0.02); }
        .editor { display: none; background: #111; border: 1px solid #00f2ff; padding: 20px; margin-bottom: 30px; }
        .toolbar { margin-bottom: 10px; display: flex; gap: 5px; flex-wrap: wrap; }
        .toolbar button { background: #000; color: #00f2ff; border: 1px solid #00f2ff; cursor: pointer; padding: 5px; }
        #edit-area { background: #fff; color: #000; min-height: 200px; padding: 10px; outline: none; }
    </style>
</head>
<body>
    <nav><a href="/" style="color:#00f2ff;">BACK TO BASE</a></nav>
    <div class="container">
        <h1>SECURE ARCHIVES</h1>
        <button id="new-doc-btn" style="display:none; margin-bottom:20px;">+ INITIALIZE NEW DATA FILE</button>

        <div id="editor-zone" class="editor">
            <div class="toolbar">
                <button onclick="exec('bold')"><b>B</b></button>
                <button onclick="exec('italic')"><i>I</i></button>
                <button onclick="exec('underline')"><u>U</u></button>
                <button onclick="exec('formatBlock', 'h1')">H1</button>
                <button onclick="exec('formatBlock', 'h2')">H2</button>
                <button onclick="exec('formatBlock', 'h3')">H3</button>
                <input type="color" onchange="exec('foreColor', this.value)">
                <button id="save-btn">UPLOAD TO CORE</button>
            </div>
            <div id="edit-area" contenteditable="true"></div>
            <p>Required Clearance: <input type="number" id="min-lvl" value="1" min="1" max="5"></p>
            <p><input type="checkbox" id="lvl4-edit"> Allow High Clearance (Lvl 4) to edit</p>
        </div>

        <div id="doc-list">Loading records...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = { /* Your Config Here */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myLvl = 0;
        let editingId = null;

        onAuthStateChanged(auth, async (user) => {
            if(!user) return;
            const snap = await getDoc(doc(db, "users", user.uid));
            myLvl = snap.data().permLevel;
            if(myLvl === 5) document.getElementById('new-doc-btn').style.display = "block";
            loadDocs();
        });

        function loadDocs() {
            onSnapshot(collection(db, "documents"), (snap) => {
                const list = document.getElementById('doc-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    if(myLvl >= (data.minClearance || 1)) {
                        const div = document.createElement('div');
                        div.className = "doc-card";
                        let editBtn = "";
                        if(myLvl === 5 || (myLvl === 4 && data.allowLvl4Edit)) {
                            editBtn = `<button onclick="openEdit('${d.id}')" style="float:right">EDIT</button>`;
                        }
                        div.innerHTML = `${editBtn}${data.html}`;
                        list.appendChild(div);
                    }
                });
            });
        }

        window.exec = (c, v) => document.execCommand(c, false, v);
        window.openEdit = async (id) => {
            const snap = await getDoc(doc(db, "documents", id));
            editingId = id;
            document.getElementById('edit-area').innerHTML = snap.data().html;
            document.getElementById('min-lvl').value = snap.data().minClearance || 1;
            document.getElementById('lvl4-edit').checked = snap.data().allowLvl4Edit || false;
            document.getElementById('editor-zone').style.display = "block";
        };

        document.getElementById('new-doc-btn').onclick = () => { editingId = null; document.getElementById('edit-area').innerHTML = ""; document.getElementById('editor-zone').style.display = "block"; };
        
        document.getElementById('save-btn').onclick = async () => {
            const payload = {
                html: document.getElementById('edit-area').innerHTML,
                minClearance: parseInt(document.getElementById('min-lvl').value),
                allowLvl4Edit: document.getElementById('lvl4-edit').checked
            };
            if(editingId) await updateDoc(doc(db, "documents", editingId), payload);
            else await addDoc(collection(db, "documents"), payload);
            document.getElementById('editor-zone').style.display = "none";
        };
    </script>
</body>
</html>
