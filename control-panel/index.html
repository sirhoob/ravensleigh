<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ravensleigh | Control Panel</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; }
        nav { padding: 20px; border-bottom: 1px solid #00f2ff; text-align: center; }
        a { color: #00f2ff; text-decoration: none; margin: 0 15px; }
        
        .admin-container { padding: 40px; max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0, 242, 255, 0.02); }
        th, td { border: 1px solid #222; padding: 12px; text-align: left; }
        th { background: #111; color: #fff; }
        
        .btn { padding: 5px 10px; cursor: pointer; border: none; font-weight: bold; font-family: 'Courier New'; }
        .approve-btn { background: #00ff00; color: #000; }
        .level-btn { background: #00f2ff; color: #000; margin-right: 5px; }
        .delete-btn { background: #ff3333; color: #fff; }
        
        .status-tag { font-size: 0.8em; padding: 2px 5px; border-radius: 3px; }
        .pending { background: #555; color: #fff; }
        .verified { background: #00f2ff; color: #000; }
    </style>
</head>
<body>

    <nav>
        <a href="/">HOME</a>
        <a href="/communications/">COMMS</a>
        <a href="/control-panel/">CONTROL PANEL</a>
    </nav>

    <div class="admin-container">
        <h1>ADMIRAL CONTROL INTERFACE</h1>
        <p>Manage sector lifeforms and clearance levels.</p>
        
        <table id="user-table">
            <thead>
                <tr>
                    <th>Designation</th>
                    <th>Role</th>
                    <th>Clearance</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="user-list">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnwjt-RorMnufPR9He4-6alU7G_ox04lU",
            authDomain: "ravensleigh-website.firebaseapp.com",
            projectId: "ravensleigh-website",
            storageBucket: "ravensleigh-website.firebasestorage.app",
            messagingSenderId: "892085441390",
            appId: "1:892085441390:web:619f81061a22cca61ca77f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // SECURITY: Ensure only Level 2 can see this
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "/login/";
            } else {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists() && snap.data().permLevel >= 2) {
                    loadUsers();
                } else {
                    alert("Unauthorized Access Attempt Detected.");
                    window.location.href = "/";
                }
            }
        });

        function loadUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                
                snapshot.forEach((userDoc) => {
                    const u = userDoc.data();
                    const id = userDoc.id;
                    const row = document.createElement('tr');

                    row.innerHTML = `
                        <td>
                            <strong>${u.name}</strong><br>
                            <span style="font-size:0.7em; color:#666;">${u.email}</span>
                        </td>
                        <td>${u.role}</td>
                        <td>
                            <span class="status-tag ${u.approved ? 'Low clearance' : 'pending'}">
                                Lvl ${u.permLevel} - ${u.approved ? 'Highest Clearance' : 'Pending'}
                            </span>
                        </td>
                        <td>
                            <button class="btn approve-btn" onclick="toggleApprove('${id}', ${u.approved})">
                                ${u.approved ? 'Revoke' : 'Approve'}
                            </button>
                            <button class="btn level-btn" onclick="changeLevel('${id}', ${u.permLevel})">Set Access Level</button>
                            <button class="btn delete-btn" onclick="removeUser('${id}')">Terminate</button>
                        </td>
                    `;
                    list.appendChild(row);
                });
            });
        }

        // --- ADMIN ACTIONS ---

        window.toggleApprove = async (id, currentStatus) => {
            await updateDoc(doc(db, "users", id), { approved: !currentStatus });
        };

        window.changeLevel = async (id, currentLevel) => {
            const newLevel = prompt("Enter Permission Level (1 or 2):", currentLevel);
            if (newLevel) {
                await updateDoc(doc(db, "users", id), { permLevel: parseInt(newLevel) });
            }
        };

        window.removeUser = async (id) => {
            if (confirm("Permanently terminate this lifeform from the database?")) {
                await deleteDoc(doc(db, "users", id));
            }
        };
    </script>
</body>
</html>
