<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravensleigh | Central Control</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; }
        nav { padding: 20px; border-bottom: 1px solid #00f2ff; text-align: center; background: #000; }
        nav a { color: #00f2ff; text-decoration: none; margin: 0 15px; font-weight: bold; }
        
        .admin-container { padding: 40px; max-width: 1200px; margin: auto; }
        h1 { letter-spacing: 5px; text-shadow: 0 0 10px #00f2ff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: rgba(0, 242, 255, 0.02); }
        th { background: #111; color: #fff; padding: 15px; text-align: left; border-bottom: 2px solid #00f2ff; }
        td { padding: 15px; border-bottom: 1px solid #222; vertical-align: top; }

        .id-details { font-size: 0.75em; color: #666; margin-top: 8px; line-height: 1.4; }
        .uid-text { color: #0088ff; } /* Blue for UID to distinguish it */

        input, select { 
            background: #111; 
            border: 1px solid #333; 
            color: #00f2ff; 
            padding: 8px; 
            font-family: 'Courier New';
            outline: none;
            width: 90%;
        }
        input:focus { border-color: #00f2ff; }

        .btn { 
            padding: 8px 15px; 
            cursor: pointer; 
            border: none; 
            font-weight: bold; 
            font-family: 'Courier New'; 
            text-transform: uppercase;
            margin-bottom: 5px;
            width: 100%;
        }
        .save-btn { background: #00f2ff; color: #000; }
        .approve-btn { background: #444; color: #fff; }
        .approve-btn.active { background: #008800; color: #fff; }
        .delete-btn { background: #440000; color: #fff; border: 1px solid #990000; }
        .delete-btn:hover { background: #ff0000; color: #000; }

        .status-badge { font-size: 10px; padding: 2px 6px; display: inline-block; margin-top: 5px; font-weight: bold; }
        .verified { background: #00f2ff; color: #000; }
        .pending { background: #ffaa00; color: #000; }
    </style>
</head>
<body>

    <nav>
        <a href="/">BASE</a>
        <a href="/communications/">COMMS</a>
        <a href="/documents/">ARCHIVES</a>
        <a href="/control-panel/">CONTROL PANEL</a>
    </nav>

    <div class="admin-container">
        <h1>ADMIRAL CONTROL PANEL</h1>
        <p>INTERNAL ACCESS ONLY: DATABASE OVERRIDE</p>
        
        <table>
            <thead>
                <tr>
                    <th>Identity & Metadata</th>
                    <th>Designation (Role)</th>
                    <th>Clearance Level</th>
                    <th>Command Actions</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnwjt-RorMnufPR9He4-6alU7G_ox04lU",
            authDomain: "ravensleigh-website.firebaseapp.com",
            projectId: "ravensleigh-website",
            storageBucket: "ravensleigh-website.firebasestorage.app",
            messagingSenderId: "892085441390",
            appId: "1:892085441390:web:619f81061a22cca61ca77f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "/login/";
            } else {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists() && snap.data().permLevel >= 2) {
                    loadUsers();
                } else {
                    alert("ACCESS DENIED: Insufficient Clearance.");
                    window.location.href = "/";
                }
            }
        });

        function loadUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                
                snapshot.forEach((userDoc) => {
                    const u = userDoc.data();
                    const id = userDoc.id;
                    const row = document.createElement('tr');

                    row.innerHTML = `
                        <td>
                            <input type="text" id="name-${id}" value="${u.name || ''}">
                            <div class="id-details">
                                <strong>EMAIL:</strong> ${u.email || 'N/A'}<br>
                                <strong>UID:</strong> <span class="uid-text">${id}</span>
                            </div>
                        </td>
                        <td>
                            <input type="text" id="role-${id}" value="${u.role || ''}">
                        </td>
                        <td>
                            <select id="perm-${id}">
                                <option value="1" ${u.permLevel == 1 ? 'selected' : ''}>Low Clearance (Lvl 1)</option>
                                <option value="2" ${u.permLevel == 2 ? 'selected' : ''}>Highest Clearance (Lvl 2)</option>
                            </select>
                            <br>
                            <span class="status-badge ${u.approved ? 'verified' : 'pending'}">
                                ${u.approved ? 'VERIFIED' : 'PENDING'}
                            </span>
                        </td>
                        <td>
                            <button class="btn save-btn" onclick="saveData('${id}')">Save Changes</button>
                            <button class="btn approve-btn ${u.approved ? 'active' : ''}" onclick="toggleStatus('${id}', ${u.approved})">
                                ${u.approved ? 'Revoke' : 'Approve'}
                            </button>
                            <button class="btn delete-btn" onclick="terminateAccount('${id}')">Terminate</button>
                        </td>
                    `;
                    list.appendChild(row);
                });
            });
        }

        window.saveData = async (id) => {
            const newName = document.getElementById(`name-${id}`).value;
            const newRole = document.getElementById(`role-${id}`).value;
            const newPerm = document.getElementById(`perm-${id}`).value;

            try {
                await updateDoc(doc(db, "users", id), {
                    name: newName,
                    role: newRole,
                    permLevel: parseInt(newPerm)
                });
                alert("Records Transmitted Successfully.");
            } catch (e) {
                alert("Transmission Error: " + e.message);
            }
        };

        window.toggleStatus = async (id, status) => {
            await updateDoc(doc(db, "users", id), { approved: !status });
        };

        window.terminateAccount = async (id) => {
            if (confirm("FINAL WARNING: Permanent deletion of lifeform record. Confirm?")) {
                await deleteDoc(doc(db, "users", id));
            }
        };
    </script>
</body>
</html>
