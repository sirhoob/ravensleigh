<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ravensleigh | Central Control</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; }
        nav { padding: 20px; border-bottom: 1px solid #00f2ff; text-align: center; }
        nav a { color: #00f2ff; text-decoration: none; margin: 0 15px; font-weight: bold; }
        
        .container { padding: 40px; max-width: 1200px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0, 242, 255, 0.02); }
        th { background: #111; color: #fff; padding: 15px; text-align: left; border-bottom: 2px solid #00f2ff; }
        td { padding: 15px; border-bottom: 1px solid #222; vertical-align: top; }

        .meta-data { font-size: 0.7em; color: #555; margin-top: 5px; }
        input, select { 
            background: #111; border: 1px solid #333; color: #00f2ff; 
            padding: 8px; font-family: 'Courier New'; width: 95%; outline: none;
        }
        input:focus { border-color: #00f2ff; }

        .btn { padding: 8px; cursor: pointer; border: none; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; width: 100%; display: block; }
        .save-btn { background: #00f2ff; color: #000; }
        .app-btn { background: #444; color: #fff; }
        .app-btn.on { background: #008800; }
        .term-btn { background: #440000; color: #fff; border: 1px solid #990000; }
        .term-btn:hover { background: #ff0000; color: #000; }

        .status-badge { font-size: 10px; padding: 2px 5px; display: inline-block; font-weight: bold; }
        .v-ok { background: #00f2ff; color: #000; }
        .v-wait { background: #ffaa00; color: #000; }
    </style>
</head>
<body>

    <nav>
        <a href="/">BASE</a>
        <a href="/communications/">COMMS</a>
        <a href="/documents/">ARCHIVES</a>
        <a href="/control-panel/">CONTROL PANEL</a>
    </nav>

    <div class="container">
        <h1>COMMANDER INTERFACE</h1>
        <p>MANAGING SECTOR PERSONNEL & CLEARANCE PROTOCOLS</p>
        
        <table>
            <thead>
                <tr>
                    <th>Identity (Name)</th>
                    <th>Designation (Role)</th>
                    <th>Clearance Level</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnwjt-RorMnufPR9He4-6alU7G_ox04lU",
            authDomain: "ravensleigh-website.firebaseapp.com",
            projectId: "ravensleigh-website",
            storageBucket: "ravensleigh-website.firebasestorage.app",
            messagingSenderId: "892085441390",
            appId: "1:892085441390:web:619f81061a22cca61ca77f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "/login/"; }
            else {
                const snap = await getDoc(doc(db, "users", user.uid));
                // Requirement: Strictly Clearance 5 for Control Panel
                if (snap.exists() && snap.data().permLevel === 5) {
                    loadUserDatabase();
                } else {
                    alert("UNAUTHORIZED ACCESS: Level 5 Clearance Required.");
                    window.location.href = "/";
                }
            }
        });

        function loadUserDatabase() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                
                snapshot.forEach((uDoc) => {
                    const u = uDoc.data();
                    const id = uDoc.id;
                    const row = document.createElement('tr');

                    row.innerHTML = `
                        <td>
                            <input type="text" id="name-${id}" value="${u.name || ''}">
                            <div class="meta-data">
                                MAIL: ${u.email}<br>
                                UID: ${id}
                            </div>
                        </td>
                        <td>
                            <input type="text" id="role-${id}" value="${u.role || ''}">
                        </td>
                        <td>
                            <select id="perm-${id}">
                                <option value="1" ${u.permLevel == 1 ? 'selected' : ''}>Lowest Clearance (Lvl 1)</option>
                                <option value="2" ${u.permLevel == 2 ? 'selected' : ''}>Low Clearance (Lvl 2)</option>
                                <option value="3" ${u.permLevel == 3 ? 'selected' : ''}>Medium Clearance (Lvl 3)</option>
                                <option value="4" ${u.permLevel == 4 ? 'selected' : ''}>Royal Clearance (Lvl 4)</option>
                                <option value="5" ${u.permLevel == 5 ? 'selected' : ''}>King Clearance (Lvl 5)</option>
                            </select>
                            <div class="status-badge ${u.approved ? 'v-ok' : 'v-wait'}">
                                ${u.approved ? 'VERIFIED' : 'PENDING'}
                            </div>
                        </td>
                        <td>
                            <button class="btn save-btn" onclick="applyChanges('${id}')">Save Data</button>
                            <button class="btn app-btn ${u.approved ? 'on' : ''}" onclick="toggleApprove('${id}', ${u.approved})">
                                ${u.approved ? 'Revoke' : 'Approve'}
                            </button>
                            <button class="btn term-btn" onclick="terminate('${id}')">Terminate</button>
                        </td>
                    `;
                    list.appendChild(row);
                });
            });
        }

        window.applyChanges = async (id) => {
            await updateDoc(doc(db, "users", id), {
                name: document.getElementById(`name-${id}`).value,
                role: document.getElementById(`role-${id}`).value,
                permLevel: parseInt(document.getElementById(`perm-${id}`).value)
            });
            alert("Database Updated.");
        };

        window.toggleApprove = async (id, status) => {
            await updateDoc(doc(db, "users", id), { approved: !status });
        };

        window.terminate = async (id) => {
            if (confirm("Permanently erase this lifeform record?")) {
                await deleteDoc(doc(db, "users", id));
            }
        };
    </script>
</body>
</html>
